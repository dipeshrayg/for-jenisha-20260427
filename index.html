<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/><title>For Jenisha</title><link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet"/><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;background:#fdf6ff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:"Caveat",cursive;overflow:hidden}#question{font-family:"Dancing Script",cursive;font-size:clamp(2.2rem,9vw,3.5rem);color:#1a0030;text-align:center;margin-bottom:40px}#btns{display:flex;gap:32px;align-items:center}#yes{background:#c084fc;color:#fff;border:none;padding:14px 36px;border-radius:30px;font-family:"Caveat",cursive;font-size:1.5rem;cursor:pointer;box-shadow:0 6px 30px rgba(192,132,252,.4);transition:transform .15s}#yes:hover{transform:scale(1.06)}#no{position:fixed;background:rgba(0,0,0,.06);color:#999;border:1.5px solid #ddd;padding:12px 28px;border-radius:30px;font-family:"Caveat",cursive;font-size:1.4rem;cursor:pointer;transition:opacity .5s}#hint{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(0,0,0,.25);font-size:.95rem;letter-spacing:.1em}#c{display:none;position:fixed;inset:0;pointer-events:none}#fin{position:fixed;inset:0;background:rgba(253,246,255,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 1.2s;padding:24px;text-align:center}#fin.show{opacity:1;pointer-events:all}.ft{font-family:"Dancing Script",cursive;font-size:clamp(2rem,9vw,3rem);color:#c084fc;margin-bottom:20px}.fm{font-family:"Caveat",cursive;font-size:clamp(1.1rem,3.5vw,1.5rem);color:#3a0060;line-height:1.88;white-space:pre-wrap}.ff{font-family:"Dancing Script",cursive;font-size:1.7rem;color:#c084fc;margin-top:18px}.fd{font-size:.7rem;color:rgba(192,132,252,.4);margin-top:3px;letter-spacing:.08em}</style></head><body><div id="question">Will you be mine?</div><div id="btns"><button id="yes">Yes 💗</button></div><button id="no">No</button><div id="hint">try clicking no</div><canvas id="c"></canvas><div id="fin"><div class="ft">Jenisha</div><div class="fm" id="fm"></div><div class="ff">— Dipesh</div><div class="fd">April 27 · 2026</div></div><script>const MSG="You pressed yes.\nGood.\n\nI would have waited.";const NAME="Jenisha";const DATE="April 27 \u00b7 2026";let tries=0;const noBtn=document.getElementById("no"),yesBtn=document.getElementById("yes");const W=window.innerWidth,H=window.innerHeight;let nx=W/2+120,ny=H/2;function moveNo(cx,cy){  const dx=nx-cx,dy=ny-cy,dist=Math.sqrt(dx*dx+dy*dy);  if(dist>160)return;  const esc=180/Math.max(dist,1);  nx=Math.max(60,Math.min(W-60,nx+dx/dist*esc));  ny=Math.max(60,Math.min(H-60,ny+dy/dist*esc));  noBtn.style.left=nx+"px";noBtn.style.top=ny+"px";  tries++;  if(tries===4){noBtn.style.opacity="0";noBtn.style.pointerEvents="none";    document.getElementById("hint").textContent="(gave up running)";}}document.addEventListener("mousemove",e=>moveNo(e.clientX,e.clientY));document.addEventListener("touchmove",e=>{e.preventDefault();moveNo(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});yesBtn.addEventListener("click",sayYes);function sayYes(){  document.getElementById("question").style.display="none";  document.getElementById("btns").style.display="none";  document.getElementById("hint").style.display="none";  const cv=document.getElementById("c");cv.style.display="block";  const ctx=cv.getContext("2d");  cv.width=window.innerWidth;cv.height=window.innerHeight;  const parts=[];  for(let i=0;i<80;i++){parts.push({x:W/2,y:H/2,vx:(Math.random()-.5)*16,vy:-3-Math.random()*12,a:1,col:`hsl(${330+Math.random()*40},90%,${65+Math.random()*15}%)`});}  function draw(){    ctx.clearRect(0,0,cv.width,cv.height);    parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.a-=.018;      if(p.a<=0)return;      ctx.save();ctx.globalAlpha=p.a;ctx.translate(p.x,p.y);ctx.scale(.9,.9);      ctx.beginPath();ctx.moveTo(0,-4);ctx.bezierCurveTo(0,-11,12,-11,12,-4);ctx.bezierCurveTo(12,3,0,12,0,16);ctx.bezierCurveTo(0,12,-12,3,-12,-4);ctx.bezierCurveTo(-12,-11,0,-11,0,-4);      ctx.fillStyle=p.col;ctx.fill();ctx.restore();});    if(parts.some(p=>p.a>0))requestAnimationFrame(draw);    else showFin();}  draw();}function showFin(){  const el=document.getElementById("fin");el.classList.add("show");  const m=document.getElementById("fm");m.textContent="";let j=0;  const iv=setInterval(()=>{if(j>=MSG.length){clearInterval(iv);return;}m.textContent+=MSG[j++];},46);}noBtn.style.left=nx+"px";noBtn.style.top=ny+"px";</script></body></html>
